name: Weekly Friday Sobha Neopolis Real Estate Crawler

on:
  schedule:
    # Runs every Friday at 8:00 PM IST (14:30 UTC)
    - cron: '30 14 * * 5'
  workflow_dispatch: # Allows manual trigger anytime from GitHub UI

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit updated data back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4

      - name: Run NoBroker Sobha Neopolis Crawler
        run: |
          python parse_nobroker_complete.py

      - name: Commit and Push updated listing data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sobha_listings.json sobha_listings.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Sobha Neopolis listings [Weekly Friday 8 PM IST]" && git push)
